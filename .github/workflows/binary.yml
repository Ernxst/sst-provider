name: generate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: install pulumi
        uses: pulumi/setup-pulumi@v2
      - run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            bun run generate.ts
          else
            bun run generate.ts --dry
          fi
